<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title & SEO -->
    <title>SPORTTOTAL PRO AG | Coming Soon</title>
    <meta name="description" content="SPORTTOTAL PRO -- AI driven sports innovations. Coming soon.">
    <meta name="author" content="SPORTTOTAL PRO AG">
    <meta name="theme-color" content="#050505">

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="SPORTTOTAL PRO AG | Coming Soon">
    <meta property="og:description" content="AI driven sports innovations. Coming soon.">
    <meta property="og:url" content="https://sporttotalpro.com">
    <meta property="og:image" content="https://sporttotalpro.com/assets/STPro_icon_bg.png">
    <meta property="og:site_name" content="SPORTTOTAL PRO AG">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="SPORTTOTAL PRO AG | Coming Soon">
    <meta name="twitter:description" content="AI driven sports innovations. Coming soon.">
    <meta name="twitter:image" content="https://sporttotalpro.com/assets/STPro_icon_bg.png">

    <!-- Favicon -->
    <link rel="icon" href="assets/STPro_icon_bg.png" type="image/png">
    <link rel="apple-touch-icon" href="assets/STPro_icon_bg.png">

    <!-- Google Fonts: Outfit (300 light, 400 regular, 600 semi, 800 extra-bold) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Full-viewport canvas for the interactive particle network animation.
         Dot pattern background is rendered directly on-canvas (not CSS) to
         avoid Safari macOS GPU compositing issues.
         Rendered by js/particles.js -- particles react to mouse movement. -->
    <canvas id="bg-canvas"></canvas>

    <!-- Frosted glass header bar -->
    <header class="glass-header">
        <div class="header-brand">
            <img src="assets/icon_bright.svg" alt="SPORTTOTAL PRO" class="header-icon">
            <span class="header-text">SPORTTOTAL PRO AG</span>
        </div>
    </header>

    <!-- Hero content overlay (centered over canvas) -->
    <main class="content">
        <div class="logo-container">
            <img src="assets/icon_pink.svg" alt="SPORTTOTAL PRO Logo" class="logo">
        </div>

        <h1 class="title">We're getting ready.</h1>
        <p class="subtitle">AI driven sports innovations.</p>

        <div class="notify-section">
            <p>Coming Soon</p>
            <div class="progress-bar-container">
                <div class="progress-bar"></div>
            </div>
        </div>
    </main>

    <!-- Particle animation (IIFE, no globals) -->
    <script src="js/particles.js"></script>

</body>
</html>
